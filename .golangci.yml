run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - revive
    - gosec

linters-settings:
  errcheck:
    check-blank: true
    check-type-assertions: true

  govet:
    enable-all: true

  goimports:
    local-prefixes: github.com/nordlys-labs/nordlys-installer

  revive:
    rules:
      - name: exported
        disabled: false

  gosec:
    excludes:
      - G204
      - G304

issues:
  exclude-dirs:
    - vendor
    - testdata
  max-same-issues: 0
