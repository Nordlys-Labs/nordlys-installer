version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: nordlys-installer
    main: ./cmd/nordlys-installer
    binary: nordlys-installer
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/nordlys-labs/nordlys-installer/internal/constants.Version={{.Version}}
    env:
      - CGO_ENABLED=0

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  github:
    owner: nordlys-labs
    name: nordlys-installer
  draft: false
  prerelease: auto
